<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Privacy Filter Test</title>
  <style>
    body { font-family: sans-serif; padding: 24px; max-width: 600px; }
    section { margin-bottom: 32px; border: 1px solid #ccc; padding: 16px; border-radius: 8px; }
    h2 { margin-top: 0; font-size: 1rem; color: #333; }
    label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: #666; }
    input, textarea { display: block; width: 100%; box-sizing: border-box; margin-bottom: 12px; padding: 6px 8px; border: 1px solid #aaa; border-radius: 4px; }
    [contenteditable] { border: 1px solid #aaa; border-radius: 4px; padding: 6px 8px; min-height: 60px; margin-bottom: 12px; background: #fafafa; }
    p.static { background: #e8f5e9; padding: 8px; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>Privacy Filter Test</h1>
  <p>このページで拡張機能がinput・textarea・contenteditableを除外して記録するか確認します。</p>

  <section>
    <h2>input 要素（この値は記録されないはず）</h2>
    <label>テキスト</label>
    <input type="text" value="秘密のテキスト input">
    <label>パスワード</label>
    <input type="password" value="secret-password-123">
    <label>メール</label>
    <input type="email" value="private@example.com">
  </section>

  <section>
    <h2>textarea 要素（この値は記録されないはず）</h2>
    <textarea>秘密のテキスト textarea
複数行の内容もここに入ります。</textarea>
  </section>

  <section>
    <h2>contenteditable 要素（この値は記録されないはず）</h2>
    <div contenteditable="true">秘密のテキスト contenteditable</div>
  </section>

  <section>
    <h2>通常テキスト（これは記録されるはず）</h2>
    <p class="static">このテキストは記録されます。</p>
  </section>
</body>
</html>
