<!DOCTYPE html>
<html id="popup" class="is-action-popup">
	<head>
		<title>Browsing Memory</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
		<link rel="stylesheet" href="style.css">
		<script src="browser-polyfill.min.js"></script>
	</head>
	<body id="popup-container">
		<div id="popup-header">
			<div class="popup-actions">
				<a href="#" id="open-settings" class="clickable-icon" data-i18n-title="settings">
					<i data-lucide="settings"></i>
				</a>
			</div>
		</div>
		<div class="setting-item mod-horizontal mod-toggle">
			<div class="setting-item-info">
				<label for="auto-save-toggle" data-i18n="autoSaveEnabled">Auto-save</label>
			</div>
			<div class="setting-item-control">
				<div class="checkbox-container">
					<input type="checkbox" id="auto-save-toggle" />
				</div>
			</div>
		</div>
		<script type="module" src="popup.js"></script>
	</body>
</html>
